<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply theme before paint to avoid a flash of the wrong palette.
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
          if (theme === 'light') document.documentElement.classList.add('light')
        } catch (e) {}
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Senior Frontend Developer with 11 years of experience in React, TypeScript, and building scalable web applications." />
    <title>Joris Pannekeet | Senior Frontend Developer</title>
    <link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
    <link href="https://fonts.bunny.net/css?family=outfit:300,400,500,600,700|jetbrains-mono:400,500" rel="stylesheet" />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
